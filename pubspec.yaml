name: learning
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.2.0
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  shared_preferences: ^2.5.5
  uuid: ^4.6.0
  intl: ^0.20.3
  fl_chart: ^1.2.0
  equatable: ^2.1.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/FlashMind.jpg"
  web:
    generate: true
    image_path: "assets/FlashMind.jpg"
    background_color: "#ffffff"
    theme_color: "#ffffff"
